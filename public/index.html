<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Алға қадам</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="badge">Қолдау алаңы</div>
      <h1>Алға қадам</h1>
      <p class="subtitle">
        Мұнда оқушы өз мәселесін қауіпсіз түрде жаза алады. Хабарлама тек жауапты адамға жіберіледі.
      </p>

      <form id="supportForm" autocomplete="off">
        <label>
          Атыңыз-жөніңіз <span>міндетті емес</span>
          <input type="text" name="name" maxlength="80" placeholder="Мысалы: Айдос немесе анонимно" />
        </label>

        <label>
          Сынып / топ <span>міндетті емес</span>
          <input type="text" name="grade" maxlength="40" placeholder="Мысалы: 8А" />
        </label>

        <label>
          Байланыс үшін телефон немесе email <span>міндетті емес</span>
          <input type="text" name="contact" maxlength="120" placeholder="Жауап алу керек болса жазыңыз" />
        </label>

        <label>
          Мәселеңізді жазыңыз <span>міндетті</span>
          <textarea name="problem" maxlength="3000" minlength="10" required placeholder="Не болды? Қашан болды? Кім көмектесе алады?" autofocus></textarea>
        </label>

        <input class="hidden" type="text" name="website" tabindex="-1" autocomplete="off" />

        <p class="warning">
          Егер дәл қазір қауіп бар болса, дереу мұғалімге, ата-анаға, мектеп әкімшілігіне немесе сенетін ересек адамға айтыңыз.
        </p>

        <button type="submit" id="submitBtn">Жіберу</button>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="/script.js"></script>
</body>
</html>
